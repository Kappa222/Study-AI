      <circle cx="44" cy="75.5" r="1" fill="#a16207" opacity="0.4"/>
    </g>

    <!-- ============= HEAD ============= -->
    <g>
      <ellipse cx="56" cy="38" rx="26" ry="24" fill="url(#head-fur)"/>
      <ellipse cx="50" cy="26" rx="14" ry="11" fill="url(#head-top)"/>

      <g stroke="#78350f" stroke-width="0.6" opacity="0.2" fill="none" stroke-linecap="round">
