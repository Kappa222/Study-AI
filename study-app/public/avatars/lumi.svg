        <path d="M50 22c0 0 1-1 2-0.5"/>
        <path d="M56 21.5c0 0 1-1 2-0.5"/>
        <path d="M62 22.5c0 0 1-1 2-0.5"/>
        <path d="M68 24.5c0 0 1-1.5 2-1"/>
