      <ellipse cx="38" cy="16" rx="4" ry="3.5" fill="url(#ear-inner)"/>
      <ellipse cx="74" cy="16" rx="6" ry="5.5" fill="url(#ear-outer)"/>
      <ellipse cx="74" cy="16" rx="4" ry="3.5" fill="url(#ear-inner)"/>

