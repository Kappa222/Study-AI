      <path d="M79 26c0 0-3-2.5-9-2" stroke="#451a03" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>

      <!-- MUZZLE -->
      <ellipse cx="56" cy="46" rx="15" ry="10" fill="url(#muzzle)"/>
      <ellipse cx="53" cy="43" rx="7" ry="4" fill="#fde68a" opacity="0.25"/>

      <!-- NOSE -->
      <ellipse cx="56" cy="42" rx="4.5" ry="3.5" fill="url(#nose)"/>
      <ellipse cx="54.5" cy="41" rx="2" ry="1" fill="#78716c" opacity="0.5"/>
      <ellipse cx="54" cy="43" rx="0.8" ry="0.5" fill="#0a0a0a" opacity="0.6"/>
      <ellipse cx="58" cy="43" rx="0.8" ry="0.5" fill="#0a0a0a" opacity="0.6"/>

      <!-- MOUTH -->
      <line x1="56" y1="45.5" x2="56" y2="48" stroke="#451a03" stroke-width="0.8" opacity="0.35"/>
      <path d="M46 50c0 0 2.5 4.5 10 4.5s10-4.5 10-4.5" stroke="#292524" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <path d="M46 50c0 0 2-1 10-1s10 1 10 1" stroke="#451a03" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.35"/>
      <ellipse cx="56" cy="52" rx="4" ry="3" fill="#e11d48" opacity="0.6"/>
      <ellipse cx="56" cy="51" rx="2.5" ry="1.2" fill="#fb7185" opacity="0.4"/>

      <!-- WHISKERS -->
      <g stroke="#a8a29e" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.45">
        <path d="M38 44c0 0-5-1-10-3"/>
        <path d="M38 46c0 0-5.5-0.5-11 0"/>
        <path d="M38 48c0 0-5 1.5-9.5 3.5"/>
        <path d="M38 42c0 0-4.5-2-8.5-4.5"/>
        <path d="M74 44c0 0 5-1 10-3"/>
        <path d="M74 46c0 0 5.5-0.5 11 0"/>
        <path d="M74 48c0 0 5 1.5 9.5 3.5"/>
        <path d="M74 42c0 0 4.5-2 8.5-4.5"/>
      </g>

      <!-- BLUSH -->
      <ellipse cx="35" cy="43" rx="4" ry="2" fill="#f43f5e" opacity="0.1"/>
      <ellipse cx="77" cy="43" rx="4" ry="2" fill="#f43f5e" opacity="0.1"/>
    </g>
  </g>
