    <g>
      <path d="M44 96c-8 5-14 10-15 16c-1 6 3 9 9 8c6-1 18-6 26-12c8-6 14-14 14-18c0-4-4-4-8-2c-4 2-12 7-16 9c-4 2-10 1-10-1z" fill="url(#body-fur)"/>
      <path d="M48 98c-5 3-10 7-11 12c-1 5 2 7 6.5 6c4.5-1 14-5 20-10c6-5 10-11 10-14c0-3-2.5-2.5-5.5-1c-3 1.5-9 5-12.5 6.5c-3.5 1.5-7.5 0.5-7.5 0.5z" fill="#78350f" opacity="0.3"/>
      <g stroke="#78350f" stroke-width="0.6" opacity="0.18" fill="none" stroke-linecap="round">
