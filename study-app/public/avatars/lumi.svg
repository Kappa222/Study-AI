    <g>
      <ellipse cx="88" cy="68" rx="7" ry="6" fill="url(#paw)" transform="rotate(-25, 88, 68)"/>
      <ellipse cx="86" cy="66.5" rx="5" ry="3.5" fill="#78350f" transform="rotate(-25, 86, 66.5)"/>
      <circle cx="96" cy="60" r="9" fill="url(#sparkle-bg)"/>
      <path d="M96 52l1.6 3.4 3.8 0.6-2.8 2.4 0.6 3.6-3.2-1.6-3.2 1.6 0.6-3.6-2.8-2.4 3.8-0.6z" fill="#fef08a"/>
      <path d="M96 54l1 2.2 2.4 0.4-1.6 1.5 0.4 2.4-2.2-1.2-2.2 1.2 0.4-2.4-1.6-1.5 2.4-0.4z" fill="#fef9c3"/>
      <circle cx="96" cy="58" r="1.5" fill="#fff" opacity="0.95"/>
