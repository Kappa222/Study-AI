      <ellipse cx="56" cy="72" rx="24" ry="30" fill="url(#body-fur)"/>
      <ellipse cx="48" cy="62" rx="14" ry="16" fill="#78350f" opacity="0.4"/>
      <ellipse cx="46" cy="60" rx="8" ry="10" fill="#9a3412" opacity="0.25"/>
      <ellipse cx="56" cy="78" rx="16" ry="20" fill="url(#belly)"/>
