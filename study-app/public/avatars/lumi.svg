        <path d="M56 106c0 0 2-1 4-0.5"/>
        <path d="M62 110c0 0 2-1 3-0.5"/>
        <path d="M46 108c0 0 2-1 3-0.5"/>
        <path d="M54 114c0 0 2-1 3-0.5"/>
      </g>
    </g>

