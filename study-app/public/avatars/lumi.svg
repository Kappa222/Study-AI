<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <radialGradient id="head-fur" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="40%" stop-color="#c2410c"/>
      <stop offset="75%" stop-color="#9a3412"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="head-top" cx="50%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#ea580c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9a3412" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body-fur" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#9a3412"/>
      <stop offset="55%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </radialGradient>
    <radialGradient id="belly" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="35%" stop-color="#fbd38d"/>
      <stop offset="75%" stop-color="#f6ad55"/>
      <stop offset="100%" stop-color="#c05621"/>
    </radialGradient>
    <radialGradient id="muzzle" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#f6ad55"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <radialGradient id="nose" cx="40%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#57534e"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </radialGradient>
    <radialGradient id="iris" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#a8a29e"/>
      <stop offset="35%" stop-color="#57534e"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </radialGradient>
    <radialGradient id="ear-outer" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </radialGradient>
    <radialGradient id="ear-inner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="paw" cx="40%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#9a3412"/>
      <stop offset="100%" stop-color="#451a03"/>
    </radialGradient>
    <radialGradient id="sparkle-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#451a03" flood-opacity="0.12"/>
    </filter>
