      <g stroke="#78350f" stroke-width="0.5" opacity="0.12" fill="none" stroke-linecap="round">
        <path d="M44 56c0 0 1-1 2-0.5"/>
        <path d="M40 62c0 0 1-1 2-0.5"/>
        <path d="M38 68c0 0 1-1 2-0.5"/>
        <path d="M42 74c0 0 1-1 2-0.5"/>
        <path d="M68 58c0 0 1-1 2-0.5"/>
        <path d="M70 64c0 0 1-1 2-0.5"/>
        <path d="M68 70c0 0 1-1 2-0.5"/>
      </g>
    </g>

    <!-- ============= HIND LEGS ============= -->
    <g>
      <ellipse cx="34" cy="92" rx="9" ry="10" fill="url(#body-fur)" transform="rotate(-10, 34, 92)"/>
      <ellipse cx="32" cy="90" rx="6" ry="6" fill="#78350f" transform="rotate(-10, 32, 90)"/>
      <ellipse cx="28" cy="100" rx="10" ry="4" fill="#451a03" transform="rotate(-6, 28, 100)"/>
      <ellipse cx="26" cy="98.5" rx="8" ry="3" fill="url(#paw)" transform="rotate(-6, 26, 98.5)"/>
      <circle cx="22" cy="99" r="2" fill="#451a03"/>
      <circle cx="27" cy="101" r="2" fill="#451a03"/>
      <circle cx="33" cy="99.5" r="2" fill="#451a03"/>

      <ellipse cx="76" cy="94" rx="9" ry="10" fill="url(#body-fur)" transform="rotate(10, 76, 94)"/>
      <ellipse cx="78" cy="92" rx="6" ry="6" fill="#78350f" transform="rotate(10, 78, 92)"/>
      <ellipse cx="82" cy="102" rx="10" ry="4" fill="#451a03" transform="rotate(6, 82, 102)"/>
      <ellipse cx="84" cy="100.5" rx="8" ry="3" fill="url(#paw)" transform="rotate(6, 84, 100.5)"/>
      <circle cx="78" cy="101" r="2" fill="#451a03"/>
      <circle cx="84" cy="103" r="2" fill="#451a03"/>
      <circle cx="90" cy="101" r="2" fill="#451a03"/>
    </g>

