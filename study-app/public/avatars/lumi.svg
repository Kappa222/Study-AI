      <ellipse cx="70" cy="34" rx="7" ry="8" fill="#f5f5f4"/>
      <ellipse cx="43" cy="34" rx="4.8" ry="6.2" fill="url(#iris)"/>
      <ellipse cx="71" cy="34" rx="4.8" ry="6.2" fill="url(#iris)"/>
      <ellipse cx="44" cy="34" rx="3" ry="4.5" fill="#0a0a0a"/>
      <ellipse cx="72" cy="34" rx="3" ry="4.5" fill="#0a0a0a"/>
      <ellipse cx="40" cy="30" rx="2.5" ry="2" fill="#fff" opacity="0.95"/>
      <ellipse cx="68" cy="30" rx="2.5" ry="2" fill="#fff" opacity="0.95"/>
      <circle cx="46" cy="37" r="1" fill="#fff" opacity="0.4"/>
      <circle cx="74" cy="37" r="1" fill="#fff" opacity="0.4"/>
      <circle cx="42" cy="32" r="0.6" fill="#fff" opacity="0.5"/>
      <circle cx="70" cy="32" r="0.6" fill="#fff" opacity="0.5"/>

